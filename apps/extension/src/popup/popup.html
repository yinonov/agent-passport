<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Passport</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --accent: #6C63FF;
      --accent-dim: rgba(108, 99, 255, 0.15);
      --accent-glow: rgba(108, 99, 255, 0.4);
      --text: #e8e8f0;
      --text-dim: #8888a8;
      --border: rgba(255,255,255,0.06);
      --approve: #22c55e;
      --reject: #ef4444;
      --warn: #f59e0b;
      --radius: 10px;
    }

    body {
      width: 400px;
      height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon { font-size: 20px; }
    .logo-name {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }
    .platform-badge {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--accent-dim);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(108,99,255,0.2);
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
    }
    .tab {
      flex: 1;
      padding: 9px 4px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }
    .badge {
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .badge.hidden { display: none; }

    /* PANELS */
    .panels { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    .panel-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .panel-scroll::-webkit-scrollbar { width: 4px; }
    .panel-scroll::-webkit-scrollbar-track { background: transparent; }
    .panel-scroll::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 2px; }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .empty-icon { font-size: 32px; margin-bottom: 10px; }
    .empty-text { font-size: 13px; line-height: 1.5; }

    /* MEMORY CARD */
    .memory-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .memory-card:hover { border-color: rgba(108,99,255,0.3); }
    .memory-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .category-pill {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .confidence-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      border-radius: 2px;
    }
    .memory-content {
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 8px;
    }
    .memory-source {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .card-actions {
      display: flex;
      gap: 6px;
    }
    .btn-sm {
      flex: 1;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .btn-approve { background: rgba(34,197,94,0.12); color: var(--approve); border-color: rgba(34,197,94,0.25); }
    .btn-approve:hover { background: rgba(34,197,94,0.2); }
    .btn-reject { background: rgba(239,68,68,0.1); color: var(--reject); border-color: rgba(239,68,68,0.2); }
    .btn-reject:hover { background: rgba(239,68,68,0.18); }
    .btn-edit { background: rgba(245,158,11,0.1); color: var(--warn); border-color: rgba(245,158,11,0.2); }
    .btn-edit:hover { background: rgba(245,158,11,0.18); }

    .edit-area {
      display: none;
      margin-top: 8px;
    }
    .edit-area.open { display: flex; gap: 6px; }
    .edit-textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      padding: 6px 8px;
      resize: none;
      height: 60px;
      font-family: inherit;
    }
    .btn-save {
      padding: 6px 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save:hover { background: #7c75ff; }

    /* CATEGORY GROUP */
    .category-group { margin-bottom: 16px; }
    .category-header {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--accent-dim);
    }

    /* INJECT PANEL */
    .inject-panel-inner { padding: 16px; }
    .platform-detect {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .platform-icon { font-size: 20px; }
    .platform-info .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .platform-info .value { font-size: 13px; font-weight: 600; color: var(--text); }
    .btn-inject {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-inject:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-inject:active { transform: translateY(0); }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .toggle-label { font-size: 12.5px; color: var(--text); }
    .toggle {
      position: relative;
      width: 38px;
      height: 21px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 21px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 15px;
      height: 15px;
      left: 2px;
      top: 2px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: all 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(17px); background: white; }

    /* FOOTER */
    .footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 8px;
    }
    .btn-footer {
      flex: 1;
      padding: 7px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-dim);
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .btn-footer:hover { color: var(--text); border-color: var(--accent); background: var(--accent-dim); }
    #import-file { display: none; }

    /* CATEGORY COLORS */
    .cat-PROFILE { background: rgba(99,179,237,0.15); color: #63b3ed; }
    .cat-PREFERENCE { background: rgba(154,230,180,0.15); color: #9ae6b4; }
    .cat-PROJECT { background: rgba(246,173,85,0.15); color: #f6ad55; }
    .cat-TASK { background: rgba(252,129,74,0.15); color: #fc814a; }
    .cat-DECISION { background: rgba(108,99,255,0.15); color: #a78bfa; }
    .cat-PERSON { background: rgba(237,137,54,0.15); color: #ed8936; }
    .cat-CONSTRAINT { background: rgba(245,101,101,0.15); color: #fc8181; }
    .cat-RECURRING { background: rgba(154,230,180,0.15); color: #68d391; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <span class="logo-icon">🛂</span>
      <span class="logo-name">Agent Passport</span>
    </div>
    <span class="platform-badge" id="platform-badge">Detecting…</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="inbox">
      Inbox
      <span class="badge hidden" id="pending-badge">0</span>
    </button>
    <button class="tab" data-tab="passport">Passport</button>
    <button class="tab" data-tab="inject">Inject</button>
  </div>

  <div class="panels">
    <!-- INBOX -->
    <div class="panel active" id="panel-inbox">
      <div class="panel-scroll" id="inbox-list">
        <div class="empty">
          <div class="empty-icon">📭</div>
          <div class="empty-text">No pending memories.<br/>Browse an AI chat to capture context.</div>
        </div>
      </div>
    </div>

    <!-- PASSPORT -->
    <div class="panel" id="panel-passport">
      <div class="panel-scroll" id="passport-list">
        <div class="empty">
          <div class="empty-icon">🗂️</div>
          <div class="empty-text">No approved memories yet.<br/>Approve items from your Inbox.</div>
        </div>
      </div>
    </div>

    <!-- INJECT -->
    <div class="panel" id="panel-inject">
      <div class="panel-scroll">
        <div class="inject-panel-inner">
          <div class="platform-detect">
            <span class="platform-icon" id="inject-platform-icon">🌐</span>
            <div class="platform-info">
              <div class="label">Current Platform</div>
              <div class="value" id="inject-platform-name">Detecting…</div>
            </div>
          </div>
          <button class="btn-inject" id="btn-inject">
            ✨ Inject My Context
          </button>
          <div class="toggle-row">
            <span class="toggle-label">Auto-inject on page load</span>
            <label class="toggle">
              <input type="checkbox" id="auto-inject-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-footer" id="btn-export">📤 Export</button>
    <button class="btn-footer" id="btn-import">📥 Import</button>
    <input type="file" id="import-file" accept=".json" />
  </div>

  <script type="module" src="../popup.js"></script>
</body>
</html>
